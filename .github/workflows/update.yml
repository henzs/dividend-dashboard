name: Update Dividend Data

：:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install finance_calendars pandas

      - name: Fetch dividend data
        run: python scripts/fetch_dividends.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dividends.json
          git diff --staged --quiet || git commit -m "Update dividend data $(date -u +%Y-%m-%d)"
          git push
